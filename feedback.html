<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback - Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .content-page {
      max-width: 800px;
      margin: 0 auto;
    }

    .content-page .hero {
      margin-bottom: 34px;
    }

    .content-copy {
      color: #555;
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 28px;
    }

    .content-copy p {
      margin: 0 0 16px;
    }

    .form-card {
      background: #1b1b1b;
      color: white;
      border-radius: 16px;
      padding: 24px;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #ddd;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      max-width: 100%;
      font-size: 16px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: white;
      outline: none;
    }

    .form-group textarea {
      min-height: 160px;
      resize: vertical;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #999;
    }

    .form-actions {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-status {
      font-size: 14px;
      color: #ccc;
      min-height: 20px;
    }

    @media (max-width: 760px) {
      .form-card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <main class="content-page">
      <div class="hero">
        <h1>Feedback</h1>
        <p class="subtext">Ideas, improvements, feature requests and bug reports are all welcome.</p>
      </div>

      <div class="content-copy">
        <p>
          Stray Parts is being built for enthusiasts, so feedback really matters. If there is something you would like improved, added or fixed, send it through below.
        </p>
      </div>

      <div class="form-card">
        <form id="feedback-form" class="form-grid">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="your@email.com" />
          </div>

          <div class="form-group">
            <label for="type">Feedback Type</label>
            <select id="type" name="type">
              <option value="idea">Idea</option>
              <option value="feature-request">Feature request</option>
              <option value="improvement">Improvement</option>
              <option value="bug">Bug report</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Your Feedback</label>
            <textarea
              id="message"
              name="message"
              placeholder="Tell us what you'd like to see, what could be improved, or what is not working."
              required
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn">Send Feedback</button>
            <div id="form-status" class="form-status"></div>
          </div>
        </form>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    async function initFeedbackPage() {
      await loadAccountBar();
      mountSiteFooter();

      const form = document.getElementById("feedback-form");
      const status = document.getElementById("form-status");

      form.addEventListener("submit", async function(event) {
        event.preventDefault();

        status.textContent = "Sending...";

        const formData = new FormData(form);
        const payload = {
          name: formData.get("name")?.toString().trim() || "",
          email: formData.get("email")?.toString().trim() || "",
          type: formData.get("type")?.toString().trim() || "other",
          message: formData.get("message")?.toString().trim() || ""
        };

        if (!payload.message) {
          status.textContent = "Please enter your feedback first.";
          return;
        }

        try {
          const response = await fetch("/api/feedback", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
            status.textContent = data.error || "Could not send feedback.";
            return;
          }

          form.reset();
          status.textContent = "Thanks — your feedback has been sent.";
        } catch (error) {
          status.textContent = "Something went wrong. Please try again.";
        }
      });
    }

    initFeedbackPage();
  </script>
</body>
</html>
