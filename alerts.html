<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notified Searches - Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .alerts-page {
      max-width: 1000px;
      margin: 0 auto;
    }

    .alerts-page .hero {
      margin-bottom: 30px;
    }

    .alerts-top-actions {
      margin-bottom: 24px;
      text-align: center;
    }

    .alerts-top-actions a {
      font-weight: bold;
    }

    .account-summary {
      margin-bottom: 16px;
    }

    .message {
      margin: 12px 0 20px;
      color: #555;
      min-height: 20px;
      line-height: 1.5;
      text-align: center;
    }

    .form-card {
      background: #1b1b1b;
      color: white;
      border-radius: 14px;
      padding: 22px;
      margin: 24px 0;
      text-align: left;
    }

    .form-card .title {
      margin-bottom: 8px;
    }

    .form-card .meta {
      margin-bottom: 14px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .form-row input {
      flex: 1;
      min-width: 240px;
      width: auto;
      margin-top: 0;
    }

    .form-row button {
      margin: 0;
      padding: 14px 18px;
      font-size: 16px;
    }

    .card .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .card .actions .btn,
    .card .actions button {
      padding: 12px 16px;
      font-size: 15px;
      margin: 0;
    }

    .empty-state .content,
    .empty-state {
      text-align: left;
    }

    @media (max-width: 760px) {
      .alerts-top-actions {
        text-align: left;
      }

      .form-row {
        flex-direction: column;
      }

      .form-row input,
      .form-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <main class="alerts-page">
      <div class="hero">
        <h1>Notified Searches</h1>
        <p class="subtext">Track the parts you want and get notified when new listings appear.</p>
      </div>

      <div class="alerts-top-actions">
        <a href="/search.html">Back to Search</a>
      </div>

      <div id="account" class="account-summary"></div>
      <div id="message" class="message"></div>

      <div class="form-card">
        <div class="title">Create New Alert</div>
        <p class="meta">Example: recaro confetti seats, gc8 turbo, ej207 engine</p>

        <div class="form-row">
          <input id="alert-query" type="text" placeholder="Enter part you want to track" />
          <button class="btn" onclick="createAlert()">Create Alert</button>
        </div>
      </div>

      <div id="alerts-list"></div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    let currentUser = null;
    let currentPlan = "free";

    async function loadPage() {
      const user = await loadAccountBar({ requireAuth: true });
      if (!user) return;

      currentUser = user;

      const accountDiv = document.getElementById("account");

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("email, plan")
        .eq("id", user.id)
        .single();

      if (profileError) {
        accountDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Could not load account profile</div>
            </div>
          </div>
        `;
        mountSiteFooter();
        return;
      }

      currentPlan = profile.plan || "free";

      let limitText = "Free plan: notified searches are not included.";
      if (currentPlan === "builder") limitText = "Builder plan: up to 10 notified searches. Checked every hour.";
      if (currentPlan === "collector") limitText = "Collector plan: up to 30 notified searches. Checked every hour.";

      accountDiv.innerHTML = `
        <div class="card">
          <div class="content">
            <div class="title">${escapeHtml(profile.email || user.email || "")}</div>
            <div class="meta">Plan: ${escapeHtml(formatPlan(currentPlan))}</div>
            <div class="meta">${escapeHtml(limitText)}</div>
          </div>
        </div>
      `;

      await loadAlerts();
      mountSiteFooter();
    }

    async function loadAlerts() {
      const alertsDiv = document.getElementById("alerts-list");

      const { data: alerts, error } = await supabaseClient
        .from("notified_searches")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        alertsDiv.innerHTML = `
          <div class="card empty-state">
            <div class="content">
              <div class="title">Could not load notified searches</div>
              <p class="meta">Please try again.</p>
            </div>
          </div>
        `;
        return;
      }

      if (!alerts || alerts.length === 0) {
        alertsDiv.innerHTML = `
          <div class="card empty-state">
            <div class="content">
              <div class="title">No notified searches yet</div>
              <p class="meta">Create one above to start tracking parts.</p>
            </div>
          </div>
        `;
        return;
      }

      alertsDiv.innerHTML = alerts.map(alert => `
        <div class="card">
          <div class="content">
            <div class="title">${escapeHtml(alert.query)}</div>
            <div class="meta">Active: ${alert.is_active ? "Yes" : "No"}</div>

            <div class="actions">
              <button class="btn" onclick="runSearch('${escapeJs(alert.query)}')">Search</button>
              <button class="btn btn-secondary" onclick="deleteAlert('${alert.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function createAlert() {
      const query = document.getElementById("alert-query").value.trim();
      const message = document.getElementById("message");
      message.innerText = "";

      if (!query) {
        message.innerText = "Enter a part name to track.";
        return;
      }

      if (currentPlan === "free") {
        const upgrade = confirm(
          "Notified searches are available on paid plans only. Upgrade now?"
        );

        if (upgrade) {
          window.location.href = "/pricing.html";
        }

        return;
      }

      const { data: existingAlerts, error: countError } = await supabaseClient
        .from("notified_searches")
        .select("id")
        .eq("user_id", currentUser.id);

      if (countError) {
        message.innerText = "Could not check your alert limits.";
        return;
      }

      const limit = currentPlan === "builder" ? 10 : 30;

      if (existingAlerts.length >= limit) {
        if (currentPlan === "builder") {
          const upgrade = confirm(
            "Builder accounts can have up to 10 notified searches. Upgrade to Collector for up to 30?"
          );

          if (upgrade) {
            window.location.href = "/pricing.html";
          }
        } else {
          message.innerText = "Collector accounts can have up to 30 notified searches.";
        }

        return;
      }

      const { data: duplicate, error: duplicateError } = await supabaseClient
        .from("notified_searches")
        .select("id")
        .eq("user_id", currentUser.id)
        .eq("query", query)
        .maybeSingle();

      if (duplicateError) {
        message.innerText = "Could not check for duplicate alert.";
        return;
      }

      if (duplicate) {
        message.innerText = "You already created an alert for this search.";
        return;
      }

      const { error } = await supabaseClient
        .from("notified_searches")
        .insert([
          {
            user_id: currentUser.id,
            query: query,
            is_active: true
          }
        ]);

      if (error) {
        message.innerText = error.message;
        return;
      }

      document.getElementById("alert-query").value = "";
      message.innerText = "Notified search created.";
      await loadAlerts();
    }

    function runSearch(query) {
      window.location.href = "/search.html?q=" + encodeURIComponent(query);
    }

    async function deleteAlert(alertId) {
      const message = document.getElementById("message");
      message.innerText = "";

      const confirmed = confirm("Delete this notified search?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("notified_searches")
        .delete()
        .eq("id", alertId)
        .eq("user_id", currentUser.id);

      if (error) {
        message.innerText = "Could not delete notified search.";
        return;
      }

      message.innerText = "Notified search deleted.";
      await loadAlerts();
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && document.activeElement && document.activeElement.id === "alert-query") {
        createAlert();
      }
    });

    loadPage();
  </script>
</body>
</html>
