<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notified Searches - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ede8d0;
      color: #222;
      padding: 60px 20px;
      margin: 0;
      text-align: center;
      position: relative;
    }

    .account-bar {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .account-bar a,
    .account-bar button {
      margin-left: 10px;
      background: none;
      border: none;
      color: #a42a0e;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      padding: 0;
    }

    .account-bar a:hover,
    .account-bar button:hover {
      color: #c43c1d;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .topbar {
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 12px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
    }

    button:hover {
      background: #c43c1d;
    }

    .secondary-btn {
      background: #2a2a2a;
      color: white;
    }

    .secondary-btn:hover {
      background: #3a3a3a;
    }

    .card {
      background: #1b1b1b;
      color: white;
      border-radius: 14px;
      padding: 18px;
      margin: 14px 0;
      text-align: left;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .actions {
      margin-top: 14px;
    }

    .message {
      margin-top: 16px;
      color: #555;
    }

    .form-card {
      background: #1b1b1b;
      color: white;
      border-radius: 14px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }

    a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      color: #c43c1d;
    }
  </style>
</head>
<body>
  <div class="account-bar" id="account-bar"></div>

  <div class="wrap">
    <h1>Notified Searches</h1>
    <p>Track the parts you want and get notified when new listings appear.</p>

    <div class="topbar">
      <a href="/search.html">Back to Search</a>
    </div>

    <div id="account"></div>
    <div id="message" class="message"></div>

    <div class="form-card">
      <div class="title">Create New Alert</div>
      <p class="meta">Example: recaro confetti seats, gc8 turbo, ej207 engine</p>
      <input id="alert-query" type="text" placeholder="Enter part you want to track">
      <button onclick="createAlert()">Create Alert</button>
    </div>

    <div id="alerts-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://gapajajlaerwfuqrdboz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhcGFqYWpsYWVyd2Z1cXJkYm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjI5ODIsImV4cCI6MjA4ODU5ODk4Mn0.sQ_WUObhZLHIPpEvO7lUjysHw58hNn_Pw6c4dft9hi8";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentPlan = "free";

    async function loadAccountBar() {
      const accountBar = document.getElementById("account-bar");
      if (!accountBar) return;

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (user) {
        accountBar.innerHTML = `
          <a href="/saved.html">Saved Listings</a>
          <a href="/alerts.html">Alerts</a>
          <button onclick="logOut()">Log Out</button>
        `;
      } else {
        accountBar.innerHTML = `
          <a href="/login.html">Log In</a>
          <a href="/signup.html">Sign Up</a>
        `;
      }
    }

    async function loadPage() {
      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      currentUser = user;

      const accountDiv = document.getElementById("account");

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (profileError) {
        accountDiv.innerHTML = `
          <div class="card">
            <div class="title">Could not load account profile</div>
          </div>
        `;
        return;
      }

      currentPlan = profile.plan || "free";

      let limitText = "Free plan: no notified searches included.";
      if (currentPlan === "builder") limitText = "Builder plan: up to 10 notified searches. Checked every hour.";
      if (currentPlan === "collector") limitText = "Collector plan: up to 30 notified searches. Checked every hour.";

      accountDiv.innerHTML = `
        <div class="card">
          <div class="title">${profile.email}</div>
          <div class="meta">Plan: ${currentPlan}</div>
          <div class="meta">${limitText}</div>
        </div>
      `;

      await loadAlerts();
    }

    async function loadAlerts() {
      const alertsDiv = document.getElementById("alerts-list");

      const { data: alerts, error } = await supabaseClient
        .from("notified_searches")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        alertsDiv.innerHTML = `<p>Could not load notified searches.</p>`;
        return;
      }

      if (!alerts || alerts.length === 0) {
        alertsDiv.innerHTML = `
          <div class="card">
            <div class="title">No notified searches yet</div>
            <p class="meta">Create one above to start tracking parts.</p>
          </div>
        `;
        return;
      }

      alertsDiv.innerHTML = alerts.map(alert => `
        <div class="card">
          <div class="title">${escapeHtml(alert.query)}</div>
          <div class="meta">Active: ${alert.is_active ? "Yes" : "No"}</div>

          <div class="actions">
            <button onclick="runSearch('${escapeJs(alert.query)}')">Search</button>
            <button class="secondary-btn" onclick="deleteAlert('${alert.id}')">Delete</button>
          </div>
        </div>
      `).join("");
    }

    async function createAlert() {
      const query = document.getElementById("alert-query").value.trim();
      const message = document.getElementById("message");
      message.innerText = "";

      if (!query) {
        message.innerText = "Enter a part name to track.";
        return;
      }

      if (currentPlan === "free") {
        const upgrade = confirm(
          "Notified searches are available on paid plans only. Upgrade now?"
        );

        if (upgrade) {
          window.location.href = "/pricing.html";
        }

        return;
      }

      const { data: existingAlerts, error: countError } = await supabaseClient
        .from("notified_searches")
        .select("id")
        .eq("user_id", currentUser.id);

      if (countError) {
        message.innerText = "Could not check your alert limits.";
        return;
      }

      const limit = currentPlan === "builder" ? 10 : 30;

      if (existingAlerts.length >= limit) {
        if (currentPlan === "builder") {
          const upgrade = confirm(
            "Builder accounts can have up to 10 notified searches. Upgrade to Collector for up to 30?"
          );

          if (upgrade) {
            window.location.href = "/pricing.html";
          }
        } else {
          message.innerText = "Collector accounts can have up to 30 notified searches.";
        }

        return;
      }

      const { data: duplicate, error: duplicateError } = await supabaseClient
        .from("notified_searches")
        .select("id")
        .eq("user_id", currentUser.id)
        .eq("query", query)
        .maybeSingle();

      if (duplicateError) {
        message.innerText = "Could not check for duplicate alert.";
        return;
      }

      if (duplicate) {
        message.innerText = "You already created an alert for this search.";
        return;
      }

      const { error } = await supabaseClient
        .from("notified_searches")
        .insert([
          {
            user_id: currentUser.id,
            query: query,
            is_active: true
          }
        ]);

      if (error) {
        message.innerText = error.message;
        return;
      }

      document.getElementById("alert-query").value = "";
      message.innerText = "Notified search created.";
      await loadAlerts();
    }

    function runSearch(query) {
      window.location.href = "/search.html?q=" + encodeURIComponent(query);
    }

    async function deleteAlert(alertId) {
      const message = document.getElementById("message");
      message.innerText = "";

      const confirmed = confirm("Delete this notified search?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("notified_searches")
        .delete()
        .eq("id", alertId)
        .eq("user_id", currentUser.id);

      if (error) {
        message.innerText = "Could not delete notified search.";
        return;
      }

      message.innerText = "Notified search deleted.";
      await loadAlerts();
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(str) {
      return String(str || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, " ");
    }

    loadAccountBar();
    loadPage();
  </script>
</body>
</html>
