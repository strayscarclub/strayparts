<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In - Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .auth-page {
      max-width: 480px;
      margin: 0 auto;
    }

    .auth-card {
      background: #1b1b1b;
      color: white;
      border-radius: 16px;
      padding: 28px;
      text-align: left;
    }

    .auth-card .subtext {
      color: #aaa;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #ddd;
    }

    .form-group input {
      width: 100%;
      max-width: 100%;
      font-size: 16px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      background: #2a2a2a;
      color: white;
      outline: none;
    }

    .form-group input::placeholder {
      color: #999;
    }

    .auth-btn {
      width: 100%;
      margin-top: 6px;
      text-align: center;
      font-weight: bold;
    }

    .message {
      margin-top: 18px;
      color: #ccc;
      min-height: 20px;
      line-height: 1.5;
    }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      color: #555;
    }

    .auth-footer a {
      color: #a42a0e;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <main class="auth-page">
      <div class="hero" style="margin-bottom: 28px;">
        <h1>Log In</h1>
        <p class="subtext">Access your saved listings, alerts and account tools.</p>
      </div>

      <div class="auth-card">
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="Email address" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" />
        </div>

        <button class="btn auth-btn" onclick="logIn()">Log In</button>

        <div class="message" id="message"></div>
      </div>

      <p class="auth-footer">
        Need an account? <a href="/signup.html">Sign up</a>
      </p>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    async function logIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      message.innerText = "";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.innerText = error.message;
        return;
      }

      message.innerText = "Logged in. Redirecting...";
      setTimeout(() => {
        window.location.href = "/my-garage.html";
      }, 800);
    }

    async function initLoginPage() {
      await loadAccountBar();
      mountSiteFooter();

      document.getElementById("password").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          logIn();
        }
      });

      document.getElementById("email").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
          logIn();
        }
      });
    }

    initLoginPage();
  </script>
</body>
</html>
