<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Listings - Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .saved-page {
      max-width: 1000px;
      margin: 0 auto;
    }

    .saved-page .hero {
      margin-bottom: 30px;
    }

    .saved-top-actions {
      margin-bottom: 24px;
      text-align: center;
    }

    .saved-top-actions a {
      font-weight: bold;
    }

    .account-summary {
      margin-bottom: 18px;
    }

    .message {
      margin: 12px 0 20px;
      min-height: 20px;
      line-height: 1.5;
      text-align: center;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .message.success {
      color: #1f5130;
      background: #e4f1e7;
      border: 1px solid #b8d8bf;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .message.error {
      color: #7a1f1f;
      background: #f7e5e5;
      border: 1px solid #e1baba;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .saved-summary-card {
      background: #f4efe0;
      border: 1px solid #d6d1b9;
      border-radius: 14px;
      padding: 18px 20px;
      text-align: left;
    }

    .saved-summary-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #777;
      margin-bottom: 8px;
    }

    .saved-summary-title {
      font-size: 22px;
      line-height: 1.2;
      color: #222;
      margin: 0 0 8px;
      font-weight: normal;
    }

    .saved-summary-copy {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
    }

    .saved-list-header {
      margin: 30px 0 14px;
      text-align: left;
    }

    .saved-list-title {
      font-size: 24px;
      color: #222;
      margin: 0 0 6px;
      font-weight: normal;
    }

    .saved-list-copy {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .saved-card {
      background: #1b1b1b;
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin: 14px 0;
      text-align: left;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .saved-thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #2a2a2a;
      object-fit: cover;
      flex-shrink: 0;
    }

    .saved-content {
      flex: 1;
      min-width: 0;
    }

    .saved-title {
      font-size: 21px;
      line-height: 1.35;
      color: white;
      margin: 0 0 10px;
      word-break: break-word;
    }

    .saved-price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .saved-meta {
      color: #aaa;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .saved-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .saved-actions .btn,
    .saved-actions button {
      padding: 12px 16px;
      font-size: 15px;
      margin: 0;
    }

    .empty-state {
      text-align: left;
    }

    @media (max-width: 760px) {
      .saved-top-actions {
        text-align: left;
      }

      .saved-card {
        flex-direction: column;
      }

      .saved-thumb {
        width: 100%;
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <main class="saved-page">
      <div class="hero">
        <h1>Saved Listings</h1>
        <p class="subtext">Keep the parts worth watching in one place so you can come back to them any time.</p>
      </div>

      <div class="saved-top-actions">
        <a href="/search.html">Back to Search</a>
      </div>

      <div id="account" class="account-summary"></div>
      <div id="message" class="message"></div>

      <div class="saved-list-header">
        <h2 class="saved-list-title">Your saved parts</h2>
        <div class="saved-list-copy">
          These are the listings you have kept aside while you decide, compare, or wait for the right time to buy.
        </div>
      </div>

      <div id="saved-listings"></div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    let currentUser = null;
    let currentPlan = "free";
    let messageTimeout = null;

    function showMessage(text, type = "success", autoHide = true) {
      const message = document.getElementById("message");
      if (!message) return;

      message.innerText = text;
      message.className = `message show ${type}`;

      if (messageTimeout) {
        clearTimeout(messageTimeout);
        messageTimeout = null;
      }

      if (autoHide) {
        messageTimeout = setTimeout(() => {
          clearMessage();
        }, 3500);
      }
    }

    function clearMessage() {
      const message = document.getElementById("message");
      if (!message) return;

      message.className = "message";
      message.innerText = "";
    }

    async function loadPage() {
      const user = await loadAccountBar({ requireAuth: true });
      if (!user) return;

      currentUser = user;

      const accountDiv = document.getElementById("account");

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("plan")
        .eq("id", user.id)
        .single();

      if (profileError) {
        accountDiv.innerHTML = `
          <div class="saved-summary-card">
            <div class="saved-summary-title">Could not load your saved listing info</div>
            <div class="saved-summary-copy">Please try again.</div>
          </div>
        `;
        mountSiteFooter();
        return;
      }

      currentPlan = profile?.plan || "free";

      const { data: listings, error: listingsCountError } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", user.id);

      const currentCount = listingsCountError ? 0 : (listings ? listings.length : 0);

      let title = "Saved listing limit reached";
      let copy = "Free accounts can save up to 5 listings at one time.";

      if (currentPlan === "free") {
        title = `${currentCount} of 5 saved listings used`;
        copy = "Free accounts can save up to 5 listings. Upgrade when you want unlimited saved parts.";
      }

      if (currentPlan === "builder" || currentPlan === "collector") {
        title = `${currentCount} saved listing${currentCount === 1 ? "" : "s"}`;
        copy = "Your paid plan includes unlimited saved listings, so you can keep track of everything worth coming back to.";
      }

      accountDiv.innerHTML = `
        <div class="saved-summary-card">
          <div class="saved-summary-kicker">Saved Listings</div>
          <h2 class="saved-summary-title">${title}</h2>
          <div class="saved-summary-copy">${copy}</div>
        </div>
      `;

      await loadSavedListings();
      mountSiteFooter();
    }

    async function loadSavedListings() {
      const listingsDiv = document.getElementById("saved-listings");

      const { data: listings, error } = await supabaseClient
        .from("saved_listings")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        listingsDiv.innerHTML = `
          <div class="saved-card empty-state">
            <div class="saved-content">
              <div class="saved-title">Could not load saved listings</div>
              <div class="saved-meta">Please try again.</div>
            </div>
          </div>
        `;
        return;
      }

      if (!listings || listings.length === 0) {
        listingsDiv.innerHTML = `
          <div class="saved-card empty-state">
            <div class="saved-content">
              <div class="saved-title">No saved listings yet</div>
              <div class="saved-meta">Go to the search page and save the parts you want to keep an eye on.</div>
            </div>
          </div>
        `;
        return;
      }

      listingsDiv.innerHTML = listings.map(listing => `
        <div class="saved-card">
          ${
            listing.image_url
              ? `<img class="saved-thumb" src="${escapeHtml(listing.image_url)}" alt="${escapeHtml(listing.title || "Saved listing")}">`
              : `<div class="saved-thumb"></div>`
          }

          <div class="saved-content">
            <h2 class="saved-title">${escapeHtml(listing.title || "Untitled listing")}</h2>
            <div class="saved-price">${escapeHtml(listing.price || "Price not available")}</div>
            <div class="saved-meta">Marketplace: ${escapeHtml(listing.marketplace || "Unknown")}</div>

            <div class="saved-actions">
              <a class="btn" href="${escapeHtml(listing.item_url || "#")}" target="_blank" rel="noopener noreferrer">View Listing</a>
              <button class="btn btn-secondary" onclick="deleteListing('${listing.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function deleteListing(listingId) {
      clearMessage();

      const confirmed = confirm("Delete this saved listing?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("saved_listings")
        .delete()
        .eq("id", listingId)
        .eq("user_id", currentUser.id);

      if (error) {
        showMessage("Could not delete saved listing.", "error", false);
        return;
      }

      showMessage("Saved listing deleted.", "success", true);
      await loadSavedListings();
      await refreshSavedSummary();
    }

    async function refreshSavedSummary() {
      const accountDiv = document.getElementById("account");

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("plan")
        .eq("id", currentUser.id)
        .single();

      currentPlan = profile?.plan || "free";

      const { data: listings } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", currentUser.id);

      const currentCount = listings ? listings.length : 0;

      let title = "Saved listing limit reached";
      let copy = "Free accounts can save up to 5 listings at one time.";

      if (currentPlan === "free") {
        title = `${currentCount} of 5 saved listings used`;
        copy = "Free accounts can save up to 5 listings. Upgrade when you want unlimited saved parts.";
      }

      if (currentPlan === "builder" || currentPlan === "collector") {
        title = `${currentCount} saved listing${currentCount === 1 ? "" : "s"}`;
        copy = "Your paid plan includes unlimited saved listings, so you can keep track of everything worth coming back to.";
      }

      accountDiv.innerHTML = `
        <div class="saved-summary-card">
          <div class="saved-summary-kicker">Saved Listings</div>
          <h2 class="saved-summary-title">${title}</h2>
          <div class="saved-summary-copy">${copy}</div>
        </div>
      `;
    }

    loadPage();
  </script>
</body>
</html>
