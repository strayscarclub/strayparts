<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Listings - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ede8d0;
      color: #222;
      padding: 60px 20px;
      margin: 0;
      text-align: center;
      position: relative;
    }

    .account-bar {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .account-bar a,
    .account-bar button {
      margin-left: 10px;
      background: none;
      border: none;
      color: #a42a0e;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      padding: 0;
    }

    .account-bar a:hover,
    .account-bar button:hover {
      color: #c43c1d;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .topbar {
      margin-bottom: 30px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px;
    }

    button:hover {
      background: #c43c1d;
    }

    .secondary-btn {
      background: #2a2a2a;
      color: white;
    }

    .secondary-btn:hover {
      background: #3a3a3a;
    }

    .card {
      background: #1b1b1b;
      color: white;
      border-radius: 14px;
      padding: 18px;
      margin: 14px 0;
      text-align: left;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #2a2a2a;
      object-fit: cover;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .actions {
      margin-top: 14px;
    }

    a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      color: #c43c1d;
    }

    .message {
      margin-top: 16px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="account-bar" id="account-bar"></div>

  <div class="wrap">
    <h1>Saved Listings</h1>
    <p>Your saved parts listings live here.</p>

    <div class="topbar">
      <a href="/search.html">Back to Search</a>
    </div>

    <div id="account"></div>
    <div id="message" class="message"></div>
    <div id="saved-listings"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://gapajajlaerwfuqrdboz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhcGFqYWpsYWVyd2Z1cXJkYm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjI5ODIsImV4cCI6MjA4ODU5ODk4Mn0.sQ_WUObhZLHIPpEvO7lUjysHw58hNn_Pw6c4dft9hi8";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentPlan = "free";

    async function loadAccountBar() {
      const accountBar = document.getElementById("account-bar");
      if (!accountBar) return;

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (user) {
        accountBar.innerHTML = `
          <a href="/saved.html">Saved Listings</a>
          <a href="/alerts.html">Alerts</a>
          <button onclick="logOut()">Log Out</button>
        `;
      } else {
        accountBar.innerHTML = `
          <a href="/login.html">Log In</a>
          <a href="/signup.html">Sign Up</a>
        `;
      }
    }

    async function loadPage() {
      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      currentUser = user;

      const accountDiv = document.getElementById("account");

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (profileError) {
        accountDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Could not load account profile</div>
            </div>
          </div>
        `;
      } else if (profile) {
        currentPlan = profile.plan || "free";

        accountDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">${profile.email}</div>
              <div class="meta">Plan: ${currentPlan}</div>
              <div class="meta">
                ${currentPlan === "free"
                  ? "Free plan: max 5 saved listings"
                  : "Paid plan: unlimited saved listings"}
              </div>
            </div>
          </div>
        `;
      }

      await loadSavedListings();
    }

    async function loadSavedListings() {
      const listingsDiv = document.getElementById("saved-listings");

      const { data: listings, error } = await supabaseClient
        .from("saved_listings")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        listingsDiv.innerHTML = `<p>Could not load saved listings.</p>`;
        return;
      }

      if (!listings || listings.length === 0) {
        listingsDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">No saved listings yet</div>
              <p class="meta">Go to the search page and save a listing.</p>
            </div>
          </div>
        `;
        return;
      }

      listingsDiv.innerHTML = listings.map(listing => `
        <div class="card">
          ${
            listing.image_url
              ? `<img class="thumb" src="${escapeHtml(listing.image_url)}" alt="${escapeHtml(listing.title)}">`
              : `<div class="thumb"></div>`
          }

          <div class="content">
            <div class="title">${escapeHtml(listing.title || "Untitled listing")}</div>
            <div class="price">${escapeHtml(listing.price || "Price not available")}</div>
            <div class="meta">Marketplace: ${escapeHtml(listing.marketplace || "Unknown")}</div>

            <div class="actions">
              <a href="${escapeHtml(listing.item_url || "#")}" target="_blank" rel="noopener noreferrer">View Listing</a>
              <button class="secondary-btn" onclick="deleteListing('${listing.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function deleteListing(listingId) {
      const message = document.getElementById("message");
      message.innerText = "";

      const confirmed = confirm("Delete this saved listing?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("saved_listings")
        .delete()
        .eq("id", listingId)
        .eq("user_id", currentUser.id);

      if (error) {
        message.innerText = "Could not delete saved listing.";
        return;
      }

      message.innerText = "Saved listing deleted.";
      await loadSavedListings();
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadAccountBar();
    loadPage();
  </script>
</body>
</html>
