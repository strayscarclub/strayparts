<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Listings - Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .saved-page {
      max-width: 1000px;
      margin: 0 auto;
    }

    .saved-page .hero {
      margin-bottom: 30px;
    }

    .saved-top-actions {
      margin-bottom: 24px;
      text-align: center;
    }

    .saved-top-actions a {
      font-weight: bold;
    }

    .account-summary {
      margin-bottom: 16px;
    }

    .message {
      margin: 12px 0 20px;
      color: #555;
      min-height: 20px;
      line-height: 1.5;
      text-align: center;
    }

    .card .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .card .actions .btn,
    .card .actions button {
      padding: 12px 16px;
      font-size: 15px;
      margin: 0;
    }

    .empty-state .content {
      text-align: left;
    }

    @media (max-width: 760px) {
      .saved-top-actions {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <main class="saved-page">
      <div class="hero">
        <h1>Saved Listings</h1>
        <p class="subtext">Your saved parts listings live here.</p>
      </div>

      <div class="saved-top-actions">
        <a href="/search.html">Back to Search</a>
      </div>

      <div id="account" class="account-summary"></div>
      <div id="message" class="message"></div>
      <div id="saved-listings"></div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    let currentUser = null;
    let currentPlan = "free";

    async function loadPage() {
      const user = await loadAccountBar({ requireAuth: true });
      if (!user) return;

      currentUser = user;

      const accountDiv = document.getElementById("account");

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("email, plan")
        .eq("id", user.id)
        .single();

      if (profileError) {
        accountDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Could not load account profile</div>
            </div>
          </div>
        `;
      } else if (profile) {
        currentPlan = profile.plan || "free";

        accountDiv.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">${escapeHtml(profile.email || user.email || "")}</div>
              <div class="meta">Plan: ${escapeHtml(formatPlan(currentPlan))}</div>
              <div class="meta">
                ${currentPlan === "free"
                  ? "Free plan: up to 5 saved listings"
                  : "Paid plan: unlimited saved listings"}
              </div>
            </div>
          </div>
        `;
      }

      await loadSavedListings();
      mountSiteFooter();
    }

    async function loadSavedListings() {
      const listingsDiv = document.getElementById("saved-listings");

      const { data: listings, error } = await supabaseClient
        .from("saved_listings")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending: false });

      if (error) {
        listingsDiv.innerHTML = `
          <div class="card empty-state">
            <div class="content">
              <div class="title">Could not load saved listings</div>
              <p class="meta">Please try again.</p>
            </div>
          </div>
        `;
        return;
      }

      if (!listings || listings.length === 0) {
        listingsDiv.innerHTML = `
          <div class="card empty-state">
            <div class="content">
              <div class="title">No saved listings yet</div>
              <p class="meta">Go to the search page and save a listing.</p>
            </div>
          </div>
        `;
        return;
      }

      listingsDiv.innerHTML = listings.map(listing => `
        <div class="card">
          ${
            listing.image_url
              ? `<img class="thumb" src="${escapeHtml(listing.image_url)}" alt="${escapeHtml(listing.title || "Saved listing")}">`
              : `<div class="thumb"></div>`
          }

          <div class="content">
            <div class="title">${escapeHtml(listing.title || "Untitled listing")}</div>
            <div class="price">${escapeHtml(listing.price || "Price not available")}</div>
            <div class="meta">Marketplace: ${escapeHtml(listing.marketplace || "Unknown")}</div>

            <div class="actions">
              <a class="btn" href="${escapeHtml(listing.item_url || "#")}" target="_blank" rel="noopener noreferrer">View Listing</a>
              <button class="btn btn-secondary" onclick="deleteListing('${listing.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function deleteListing(listingId) {
      const message = document.getElementById("message");
      message.innerText = "";

      const confirmed = confirm("Delete this saved listing?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("saved_listings")
        .delete()
        .eq("id", listingId)
        .eq("user_id", currentUser.id);

      if (error) {
        message.innerText = "Could not delete saved listing.";
        return;
      }

      message.innerText = "Saved listing deleted.";
      await loadSavedListings();
    }

    loadPage();
  </script>
</body>
</html>
