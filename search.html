<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #b0b0b0;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input {
      width: 320px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #ff5c5c;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
    }

    button:hover {
      background: #a42a0e;
    }

    .results {
      margin-top: 40px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 16px 0;
      border-radius: 12px;
      text-align: left;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .card a {
      color: #ff5c5c;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Stray Parts Search</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <div class="results" id="results"></div>

  <script>
async function searchParts() {

  const input = document.getElementById("query")
  const results = document.getElementById("results")
  const query = input.value.trim()

  if(!query){
    results.innerHTML = "<p>Enter a search term</p>"
    return
  }

  const encodedQuery = encodeURIComponent(query)

  results.innerHTML = "<p>Searching eBay...</p>"

  const rssUrl =
  `https://api.allorigins.win/raw?url=https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}&_rss=1`

  try{

    const res = await fetch(rssUrl)
    const text = await res.text()

    const parser = new DOMParser()
    const xml = parser.parseFromString(text,"text/xml")

    const items = xml.querySelectorAll("item")

    let html = ""

    items.forEach((item,i)=>{

      if(i > 5) return

      const title = item.querySelector("title").textContent
      const link = item.querySelector("link").textContent

      html += `
      <div class="card">
        <h3>${title}</h3>
        <a href="${link}" target="_blank">View on eBay</a>
      </div>
      `
    })

    html += `
      <div class="card">
      <h3>Search other sites</h3>
      <a target="_blank" href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}">
      Facebook Marketplace
      </a><br><br>

      <a target="_blank" href="https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}">
      Yahoo Auctions Japan
      </a><br><br>

      <a target="_blank" href="https://www.google.com/search?q=${encodedQuery}+car+parts">
      Forums & Listings
      </a>
      </div>
    `

    results.innerHTML = html

  }catch(err){

    results.innerHTML = "<p>Could not load eBay results.</p>"

  }

}
  </script>
</body>
</html>
