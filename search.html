<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    :root {
      --bg: #ede8d0;
      --text: #222;
      --muted: #666;
      --muted-light: #888;
      --border: #d6d1b9;
      --brand: #a42a0e;
      --brand-hover: #c43c1d;
      --pill: #d6d1b9;
      --pill-hover: #cfc8aa;
      --card: #1b1b1b;
      --card-soft: #2a2a2a;
      --card-text: #fff;
      --card-muted: #aaa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 48px;
    }

    .logo-wrap img {
      height: 72px;
      width: auto;
      display: block;
    }

    .account-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .account-bar a,
    .account-bar button {
      background: none;
      border: none;
      color: var(--brand);
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    .account-bar a:hover,
    .account-bar button:hover {
      color: var(--brand-hover);
    }

    .hero {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.1;
    }

    .hero p {
      color: #555;
      margin: 0;
      font-size: 16px;
    }

    .search-wrap {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      width: 420px;
      max-width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      background: #fff;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: var(--brand);
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--brand-hover);
    }

    .secondary-btn {
      background: #2a2a2a;
      color: white;
    }

    .secondary-btn:hover {
      background: #3a3a3a;
    }

    .divider {
      margin: 40px auto;
      width: min(680px, 100%);
      border: 0;
      border-top: 1px solid var(--border);
    }

    .results {
      margin-top: 10px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    .tabs {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      flex-wrap: wrap;
      margin: 0 0 24px 0;
    }

    .tab-btn {
      background: var(--pill);
      color: var(--text);
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      margin: 0;
    }

    .tab-btn:hover {
      background: var(--pill-hover);
    }

    .tab-btn.active {
      background: var(--brand);
      color: white;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .section-title {
      text-align: left;
      font-size: 22px;
      margin: 30px 0 12px 0;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      text-align: left;
    }

    .thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: var(--card-soft);
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: var(--card-text);
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--card-text);
    }

    .meta {
      color: var(--card-muted);
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .card a {
      color: var(--brand);
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      color: var(--brand-hover);
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .source-card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      text-align: left;
      color: white;
    }

    .source-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .source-card a {
      color: var(--brand);
      text-decoration: none;
      font-weight: bold;
    }

    .source-card a:hover {
      color: var(--brand-hover);
    }

    .muted {
      color: var(--card-muted);
      font-size: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 14px 0;
      color: #ddd;
      font-size: 14px;
      line-height: 1.5;
    }

    .checkbox-row input {
      margin-top: 3px;
      flex-shrink: 0;
    }

    .inline-actions {
      margin-top: 12px;
    }

    footer {
      margin-top: 80px;
      padding: 30px 20px 10px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-copy {
      color: var(--muted);
      font-size: 14px;
      margin: 0 auto 14px;
      max-width: 760px;
      line-height: 1.6;
    }

    .footer-nav {
      margin-bottom: 12px;
    }

    .footer-nav a {
      color: var(--brand);
      text-decoration: none;
      margin: 0 10px;
      display: inline-block;
    }

    .footer-nav a:hover {
      color: var(--brand-hover);
    }

    .footer-meta {
      color: var(--muted-light);
      font-size: 13px;
      margin: 0;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 30px;
      }

      .account-bar {
        justify-content: flex-start;
      }

      h1 {
        font-size: 30px;
      }

      .search-wrap {
        flex-direction: column;
      }

      .search-wrap input,
      .search-wrap button {
        width: 100%;
      }

      .card {
        flex-direction: column;
      }

      .thumb {
        width: 100%;
        height: 220px;
      }

      .footer-nav a {
        margin: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo-wrap">
        <a href="/">
          <img src="/strayparts-logo.png" alt="Stray Parts logo">
        </a>
      </div>

      <div class="account-bar" id="account-bar"></div>
    </div>

    <div class="hero">
      <h1>Search Parts</h1>
      <p>Search multiple marketplaces for rare car parts</p>

      <div class="search-wrap">
        <input id="query" type="text" placeholder="Search car parts..." />
        <button onclick="searchParts()">Search</button>
      </div>
    </div>

    <hr class="divider" />

    <div class="results" id="results"></div>

    <footer>
      <p class="footer-copy">
        Stray Parts searches marketplaces like eBay, Facebook Marketplace and Yahoo Auctions to help enthusiasts find rare car parts faster.
      </p>

      <div class="footer-nav">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/feedback.html">Feedback</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/pricing.html">Pricing</a>
      </div>

      <p class="footer-meta">© Stray Parts</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://gapajajlaerwfuqrdboz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhcGFqYWpsYWVyd2Z1cXJkYm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjI5ODIsImV4cCI6MjA4ODU5ODk4Mn0.sQ_WUObhZLHIPpEvO7lUjysHw58hNn_Pw6c4dft9hi8";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentPlan = "free";
    let upgarageAcknowledged = false;

    async function loadAccountBar() {
      const accountBar = document.getElementById("account-bar");
      if (!accountBar) return;

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;
      currentUser = user || null;

      if (user) {
        const { data: profile } = await supabaseClient
          .from("profiles")
          .select("plan, upgarage_acknowledged")
          .eq("id", user.id)
          .single();

        currentPlan = profile?.plan || "free";
        upgarageAcknowledged = !!profile?.upgarage_acknowledged;

        accountBar.innerHTML = `
          <a href="/my-garage.html">My Garage</a>
          <button onclick="logOut()">Log Out</button>
        `;
      } else {
        currentPlan = "free";
        upgarageAcknowledged = localStorage.getItem("upgarage_acknowledged") === "true";

        accountBar.innerHTML = `
          <a href="/login.html">Log In</a>
          <a href="/signup.html">Sign Up</a>
        `;
      }
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    async function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Enter a search term</div>
              <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
            </div>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      results.innerHTML = `
        <div class="card">
          <div class="content">
            <div class="title">Searching...</div>
            <p class="muted">Looking for <strong>${escapeHtml(query)}</strong></p>
          </div>
        </div>
      `;

      await loadAccountBar();

      let ebayHtml = "";
      let upgarageHtml = "";
      let yahooHtml = "";
      let otherSourcesHtml = "";

      try {
        const ebayRes = await fetch("/api/ebay?q=" + encodedQuery);
        const ebayData = await ebayRes.json();

        ebayHtml = `<div class="section-title">eBay Results</div>`;

        if (ebayData.itemSummaries && ebayData.itemSummaries.length > 0) {
          ebayData.itemSummaries.forEach((item) => {
            const title = item.title || "Untitled listing";
            const rawLink = item.itemWebUrl || "#";
            const affiliateLink =
              rawLink +
              (rawLink.includes("?") ? "&" : "?") +
              "mkcid=1&mkrid=711-53200-19255-0&siteid=0&campid=5339144348&customid=&toolid=10001&mkevt=1";

            const price = item.price
              ? `${item.price.value} ${item.price.currency}`
              : "Price not available";

            const image = item.image && item.image.imageUrl
              ? item.image.imageUrl
              : "";

            ebayHtml += `
              <div class="card">
                ${
                  image
                    ? `<img class="thumb" src="${escapeHtml(image)}" alt="${escapeHtml(title)}">`
                    : `<div class="thumb"></div>`
                }
                <div class="content">
                  <div class="title">${escapeHtml(title)}</div>
                  <div class="price">${escapeHtml(price)}</div>
                  <div class="meta">Marketplace: eBay</div>
                  <a href="${escapeHtml(affiliateLink)}" target="_blank" rel="noopener noreferrer">View on eBay</a>
                  <br><br>
                  <button onclick="saveListing(
                    '${escapeJs(title)}',
                    '${escapeJs(affiliateLink)}',
                    '${escapeJs(image)}',
                    '${escapeJs(price)}',
                    'eBay'
                  )">Save Listing</button>
                </div>
              </div>
            `;
          });
        } else {
          ebayHtml += `
            <div class="card">
              <div class="content">
                <div class="title">No eBay results found</div>
                <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">
                  Search directly on eBay
                </a>
              </div>
            </div>
          `;
        }
      } catch (error) {
        ebayHtml = `
          <div class="section-title">eBay Results</div>
          <div class="card">
            <div class="content">
              <div class="title">Could not load eBay results</div>
            </div>
          </div>
        `;
      }

      if (!upgarageAcknowledged) {
        upgarageHtml = `
          <div class="section-title">Up Garage</div>
          <div class="card">
            <div class="content">
              <div class="title">Unlock Up Garage</div>
              <div class="meta">
                Up Garage is intended for enthusiasts sourcing parts for personal vehicle use, not resale. By viewing Up Garage results in Stray Parts, you agree to use this source in that spirit.
              </div>
              <label class="checkbox-row">
                <input type="checkbox" id="upgarage-agree-checkbox">
                <span>I understand and agree.</span>
              </label>
              <div class="inline-actions">
                <button onclick="acknowledgeUpGarage()">Continue to Up Garage results</button>
              </div>
            </div>
          </div>
        `;
      } else {
        try {
          const upgarageUrl =
            (currentPlan === "builder" || currentPlan === "collector")
              ? "/api/upgarage?q=" + encodedQuery + "&smart=1"
              : "/api/upgarage?q=" + encodedQuery;

          const upgarageRes = await fetch(upgarageUrl);
          const upgarageData = await upgarageRes.json();

          upgarageHtml = `<div class="section-title">Up Garage Results</div>`;

          if (upgarageData.items && upgarageData.items.length > 0) {
            upgarageData.items.forEach((item) => {
              const title = item.display_title || item.title || "Untitled listing";
              const englishHint = item.english_hint || "";
              const itemUrl = item.item_url || "#";
              const price = item.price || "Price not available";
              const image = item.image_url || "";
              const shopName = item.shop_name || "";
              const category = item.category || "";
              const condition = item.condition || "";

              upgarageHtml += `
                <div class="card">
                  ${
                    image
                      ? `<img class="thumb" src="${escapeHtml(image)}" alt="${escapeHtml(title)}">`
                      : `<div class="thumb"></div>`
                  }
                  <div class="content">
                    <div class="title">${escapeHtml(title)}</div>
                    ${englishHint ? `<div class="meta">${escapeHtml(englishHint)}</div>` : ""}
                    <div class="price">${escapeHtml(price)}</div>
                    <div class="meta">
                      Marketplace: Up Garage
                      ${shopName ? ` • Shop: ${escapeHtml(shopName)}` : ""}
                      ${category ? ` • Category: ${escapeHtml(category)}` : ""}
                      ${condition ? ` • Condition: ${escapeHtml(condition)}` : ""}
                    </div>
                    <a href="${escapeHtml(itemUrl)}" target="_blank" rel="noopener noreferrer">View on Up Garage</a>
                    <br><br>
                    <button onclick="saveListing(
                      '${escapeJs(title)}',
                      '${escapeJs(itemUrl)}',
                      '${escapeJs(image)}',
                      '${escapeJs(price)}',
                      'Up Garage'
                    )">Save Listing</button>
                  </div>
                </div>
              `;
            });
          } else {
            upgarageHtml += `
              <div class="card">
                <div class="content">
                  <div class="title">No Up Garage results found</div>
                </div>
              </div>
            `;
          }
        } catch (error) {
          upgarageHtml = `
            <div class="section-title">Up Garage Results</div>
            <div class="card">
              <div class="content">
                <div class="title">Could not load Up Garage results</div>
              </div>
            </div>
          `;
        }
      }

      try {
        const yahooUrl =
          (currentPlan === "builder" || currentPlan === "collector")
            ? "/api/yahooauctions?q=" + encodedQuery + "&smart=1"
            : "/api/yahooauctions?q=" + encodedQuery;

        const yahooRes = await fetch(yahooUrl);
        const yahooData = await yahooRes.json();

        yahooHtml = `<div class="section-title">Yahoo Auctions Results</div>`;

        if (yahooData.items && yahooData.items.length > 0) {
          yahooData.items.forEach((item) => {
            const title = item.display_title || item.title || "Untitled listing";
            const englishHint = item.english_hint || "";
            const itemUrl = item.item_url || "#";
            const price = item.price || "Price not available";
            const image = item.image_url || "";
            const shipping = item.shipping || "";
            const timeLeft = item.time_left || "";

            yahooHtml += `
              <div class="card">
                ${
                  image
                    ? `<img class="thumb" src="${escapeHtml(image)}" alt="${escapeHtml(title)}">`
                    : `<div class="thumb"></div>`
                }
                <div class="content">
                  <div class="title">${escapeHtml(title)}</div>
                  ${englishHint ? `<div class="meta">${escapeHtml(englishHint)}</div>` : ""}
                  <div class="price">${escapeHtml(price)}</div>
                  <div class="meta">
                    Marketplace: Yahoo Auctions
                    ${shipping ? ` • ${escapeHtml(shipping)}` : ""}
                    ${timeLeft ? ` • ${escapeHtml(timeLeft)}` : ""}
                  </div>
                  <a href="${escapeHtml(itemUrl)}" target="_blank" rel="noopener noreferrer">View on Yahoo Auctions</a>
                  <br><br>
                  <button onclick="saveListing(
                    '${escapeJs(title)}',
                    '${escapeJs(itemUrl)}',
                    '${escapeJs(image)}',
                    '${escapeJs(price)}',
                    'Yahoo Auctions'
                  )">Save Listing</button>
                </div>
              </div>
            `;
          });
        } else {
          yahooHtml += `
            <div class="card">
              <div class="content">
                <div class="title">No Yahoo Auctions results found</div>
                <a href="https://auctions.yahoo.co.jp/search/search/${encodedQuery}/0/" target="_blank" rel="noopener noreferrer">
                  Search directly on Yahoo Auctions
                </a>
              </div>
            </div>
          `;
        }
      } catch (error) {
        yahooHtml = `
          <div class="section-title">Yahoo Auctions Results</div>
          <div class="card">
            <div class="content">
              <div class="title">Could not load Yahoo Auctions results</div>
            </div>
          </div>
        `;
      }

      otherSourcesHtml = `
        <div class="section-title">Other Sources</div>
        <div class="source-grid">
          <div class="source-card">
            <h3>Facebook Marketplace</h3>
            <p class="muted">Search Marketplace for <strong>${escapeHtml(query)}</strong></p>
            <a href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Facebook Marketplace
            </a>
          </div>

          <div class="source-card">
            <h3>Forums & Web Listings</h3>
            <p class="muted">Search forums and listings related to <strong>${escapeHtml(query)}</strong></p>
            <a href="https://www.google.com/search?q=${encodedQuery}+car+parts" target="_blank" rel="noopener noreferrer">
              Search forums & listings
            </a>
          </div>
        </div>
      `;

      results.innerHTML = `
        <div class="tabs">
          <button class="tab-btn active" data-tab="all" onclick="switchTab('all', this)">All</button>
          <button class="tab-btn" data-tab="ebay" onclick="switchTab('ebay', this)">eBay</button>
          <button class="tab-btn" data-tab="upgarage" onclick="switchTab('upgarage', this)">Up Garage</button>
          <button class="tab-btn" data-tab="yahoo" onclick="switchTab('yahoo', this)">Yahoo Auctions</button>
        </div>

        <div class="tab-panel active" id="tab-all">
          ${ebayHtml}
          ${upgarageHtml}
          ${yahooHtml}
          ${otherSourcesHtml}
        </div>

        <div class="tab-panel" id="tab-ebay">
          ${ebayHtml}
        </div>

        <div class="tab-panel" id="tab-upgarage">
          ${upgarageHtml}
        </div>

        <div class="tab-panel" id="tab-yahoo">
          ${yahooHtml}
        </div>
      `;
    }

    function switchTab(tabName, btn) {
      document.querySelectorAll(".tab-panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelectorAll(".tab-btn").forEach(tab => {
        tab.classList.remove("active");
      });

      const panel = document.getElementById("tab-" + tabName);
      if (panel) panel.classList.add("active");
      if (btn) btn.classList.add("active");
    }

    async function acknowledgeUpGarage() {
      const checkbox = document.getElementById("upgarage-agree-checkbox");

      if (!checkbox || !checkbox.checked) {
        alert("Please tick the checkbox to continue.");
        return;
      }

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        localStorage.setItem("upgarage_acknowledged", "true");
        upgarageAcknowledged = true;
        searchParts();
        return;
      }

      const { error } = await supabaseClient
        .from("profiles")
        .update({ upgarage_acknowledged: true })
        .eq("id", user.id);

      if (error) {
        alert("Could not save your acknowledgement.");
        return;
      }

      upgarageAcknowledged = true;
      searchParts();
    }

    async function saveListing(title, itemUrl, imageUrl, price, marketplace) {
      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("plan")
        .eq("id", user.id)
        .single();

      if (profileError) {
        alert("Could not load your account plan.");
        return;
      }

      const { data: existingListings, error: countError } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", user.id);

      if (countError) {
        alert("Could not check saved listings.");
        return;
      }

      const isPaid = profile && profile.plan !== "free";

      if (!isPaid && existingListings.length >= 5) {
        const upgrade = confirm(
          "Free accounts can save up to 5 listings. Upgrade your plan for unlimited saved listings and notified searches. Go to pricing page now?"
        );

        if (upgrade) {
          window.location.href = "/pricing.html";
        }

        return;
      }

      const { data: duplicate, error: duplicateError } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", user.id)
        .eq("item_url", itemUrl)
        .maybeSingle();

      if (duplicateError) {
        alert("Could not check for duplicate listing.");
        return;
      }

      if (duplicate) {
        alert("You already saved this listing.");
        return;
      }

      const { error } = await supabaseClient
        .from("saved_listings")
        .insert([
          {
            user_id: user.id,
            title,
            item_url: itemUrl,
            image_url: imageUrl,
            price,
            marketplace
          }
        ]);

      if (error) {
        alert(error.message);
        return;
      }

      alert("Listing saved.");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(str) {
      return String(str || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, " ");
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    loadAccountBar().then(() => {
      if (q) {
        document.getElementById("query").value = q;
        searchParts();
      }
    });
  </script>
</body>
</html>
