<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #b0b0b0;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input {
      width: 360px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    .results {
      margin-top: 40px;
      max-width: 980px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-title {
      text-align: left;
      font-size: 22px;
      margin: 30px 0 12px 0;
    }

    .card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      text-align: left;
    }

    .thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #2a2a2a;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 13px;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .meta {
      color: #9a9a9a;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      text-decoration: underline;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .source-card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 18px;
      text-align: left;
    }

    .source-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .muted {
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Stray Parts Search</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <div class="results" id="results"></div>

  <script>
    function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Enter a search term</div>
              <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
            </div>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      results.innerHTML = `
        <div class="section-title">eBay Results</div>

        <div class="card">
          <div class="thumb">Image</div>
          <div class="content">
            <div class="title">Live eBay listings will appear here once the API is connected</div>
            <div class="price">$---.--</div>
            <div class="meta">Marketplace: eBay</div>
            <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search directly on eBay
            </a>
          </div>
        </div>

        <div class="card">
          <div class="thumb">Image</div>
          <div class="content">
            <div class="title">This layout is ready for title, image, price and affiliate links</div>
            <div class="price">$---.--</div>
            <div class="meta">Marketplace: eBay</div>
            <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              View more on eBay
            </a>
          </div>
        </div>

        <div class="section-title">Other Sources</div>

        <div class="source-grid">
          <div class="source-card">
            <h3>Facebook Marketplace</h3>
            <p class="muted">Search Marketplace for <strong>${query}</strong></p>
            <a href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Facebook Marketplace
            </a>
          </div>

          <div class="source-card">
            <h3>Yahoo Auctions Japan</h3>
            <p class="muted">Search Yahoo Auctions Japan for <strong>${query}</strong></p>
            <a href="https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Yahoo Auctions Japan
            </a>
          </div>

          <div class="source-card">
            <h3>Forums & Web Listings</h3>
            <p class="muted">Search forums and listings related to <strong>${query}</strong></p>
            <a href="https://www.google.com/search?q=${encodedQuery}+car+parts" target="_blank" rel="noopener noreferrer">
              Search forums & listings
            </a>
          </div>
        </div>
      `;
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    if (q) {
      document.getElementById("query").value = q;
      searchParts();
    }
  </script>
</body>
</html>
