<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #b0b0b0;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input {
      width: 320px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
    }

    button:hover {
      opacity: 0.9;
    }

    .results {
      margin-top: 40px;
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 16px 0;
      border-radius: 12px;
      text-align: left;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      text-decoration: underline;
    }

    .muted {
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Stray Parts Search</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <div class="results" id="results"></div>

  <script>
    async function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <h3>Enter a search term</h3>
            <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      results.innerHTML = `
        <div class="card">
          <h3>Searching eBay...</h3>
          <p class="muted">Looking for <strong>${query}</strong></p>
        </div>
      `;

      try {
        const res = await fetch(`/api/ebay?q=${encodedQuery}`);
        const data = await res.json();

        let html = "";

        if (data.items && data.items.length > 0) {
          data.items.forEach((item) => {
            html += `
              <div class="card">
                <h3>${item.title}</h3>
                <p class="muted">Live eBay result</p>
                <a href="${item.link}" target="_blank" rel="noopener noreferrer">View on eBay</a>
              </div>
            `;
          });
        } else {
          html += `
            <div class="card">
              <h3>No eBay results found</h3>
              <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">Search directly on eBay</a>
            </div>
          `;
        }

        html += `
          <div class="card">
            <h3>Other Sources</h3>
            <p><a href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}" target="_blank" rel="noopener noreferrer">Search Facebook Marketplace</a></p>
            <p><a href="https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}" target="_blank" rel="noopener noreferrer">Search Yahoo Auctions Japan</a></p>
            <p><a href="https://www.google.com/search?q=${encodedQuery}+car+parts" target="_blank" rel="noopener noreferrer">Search forums & listings</a></p>
          </div>
        `;

        results.innerHTML = html;
      } catch (error) {
        results.innerHTML = `
          <div class="card">
            <h3>Could not load results</h3>
            <p class="muted">Please try again.</p>
          </div>
        `;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    if (q) {
      document.getElementById("query").value = q;
      searchParts();
    }
  </script>
</body>
</html>
