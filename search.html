<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ede8d0;
      color: #222;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
      position: relative;
    }

    .logo-wrap {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    .logo-wrap img {
      height: 72px;
      width: auto;
      display: block;
    }

    .account-bar {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .account-bar a,
    .account-bar button {
      margin-left: 10px;
      background: none;
      border: none;
      color: #a42a0e;
      font-size: 15px;
      text-decoration: none;
      cursor: pointer;
      padding: 0;
    }

    .account-bar a:hover,
    .account-bar button:hover {
      color: #c43c1d;
    }

    h1 {
      margin-bottom: 10px;
      margin-top: 30px;
    }

    p {
      color: #555;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input[type="text"] {
      width: 360px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #c43c1d;
    }

    .secondary-btn {
      background: #2a2a2a;
      color: white;
    }

    .secondary-btn:hover {
      background: #3a3a3a;
    }

    .results {
      margin-top: 40px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-title {
      text-align: left;
      font-size: 22px;
      margin: 30px 0 12px 0;
    }

    .card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      text-align: left;
    }

    .thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #2a2a2a;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      color: #c43c1d;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .source-card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 18px;
      text-align: left;
      color: white;
    }

    .source-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .source-card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .source-card a:hover {
      color: #c43c1d;
    }

    .muted {
      color: #aaa;
      font-size: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 14px 0;
      color: #ddd;
      font-size: 14px;
    }

    .checkbox-row input {
      margin-top: 3px;
      flex-shrink: 0;
    }

    .inline-actions {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <a href="/">
      <img src="/strayparts-logo.png" alt="Stray Parts logo">
    </a>
  </div>

  <div class="account-bar" id="account-bar"></div>

  <h1>Search Parts</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <hr style="margin:40px auto;width:60%;border:0;border-top:1px solid #d6d1b9;">

  <div class="results" id="results"></div>

  <footer style="margin-top:80px;padding:30px 20px;border-top:1px solid #d6d1b9;text-align:center;">
    <p style="color:#666;font-size:14px;margin-bottom:14px;">
      Stray Parts searches marketplaces like eBay, Facebook Marketplace and Yahoo Auctions to help enthusiasts find rare car parts faster.
    </p>

    <div style="margin-bottom:12px;">
      <a href="/" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Home</a>
      <a href="/about.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">About</a>
      <a href="/contact.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Contact</a>
      <a href="/privacy.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Privacy</a>
      <a href="/pricing.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Pricing</a>
    </div>

    <p style="color:#888;font-size:13px;margin:0;">
      © Stray Parts
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://gapajajlaerwfuqrdboz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhcGFqYWpsYWVyd2Z1cXJkYm96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjI5ODIsImV4cCI6MjA4ODU5ODk4Mn0.sQ_WUObhZLHIPpEvO7lUjysHw58hNn_Pw6c4dft9hi8";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentPlan = "free";
    let upgarageAcknowledged = false;

    async function loadAccountBar() {
      const accountBar = document.getElementById("account-bar");
      if (!accountBar) return;

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;
      currentUser = user || null;

      if (user) {
        const { data: profile } = await supabaseClient
          .from("profiles")
          .select("plan, upgarage_acknowledged")
          .eq("id", user.id)
          .single();

        currentPlan = profile?.plan || "free";
        upgarageAcknowledged = !!profile?.upgarage_acknowledged;

        accountBar.innerHTML = `
          <a href="/saved.html">Saved Listings</a>
          <a href="/alerts.html">Alerts</a>
          <button onclick="logOut()">Log Out</button>
        `;
      } else {
        currentPlan = "free";
        upgarageAcknowledged = false;

        accountBar.innerHTML = `
          <a href="/login.html">Log In</a>
          <a href="/signup.html">Sign Up</a>
        `;
      }
    }

    async function logOut() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    async function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Enter a search term</div>
              <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
            </div>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      results.innerHTML = `
        <div class="card">
          <div class="content">
            <div class="title">Searching...</div>
            <p class="muted">Looking for <strong>${escapeHtml(query)}</strong></p>
          </div>
        </div>
      `;

      await loadAccountBar();

      const sections = [];

      // eBay
      try {
        const ebayRes = await fetch("/api/ebay?q=" + encodedQuery);
        const ebayData = await ebayRes.json();

        let ebayHtml = `<div class="section-title">eBay Results</div>`;

        if (ebayData.itemSummaries && ebayData.itemSummaries.length > 0) {
          ebayData.itemSummaries.forEach((item) => {
            const title = item.title || "Untitled listing";
            const rawLink = item.itemWebUrl || "#";
            const affiliateLink =
              rawLink +
              (rawLink.includes("?") ? "&" : "?") +
              "mkcid=1&mkrid=711-53200-19255-0&siteid=0&campid=5339144348&customid=&toolid=10001&mkevt=1";

            const price = item.price
              ? `${item.price.value} ${item.price.currency}`
              : "Price not available";

            const image = item.image && item.image.imageUrl
              ? item.image.imageUrl
              : "";

            ebayHtml += `
              <div class="card">
                ${
                  image
                    ? `<img class="thumb" src="${escapeHtml(image)}" alt="${escapeHtml(title)}">`
                    : `<div class="thumb"></div>`
                }
                <div class="content">
                  <div class="title">${escapeHtml(title)}</div>
                  <div class="price">${escapeHtml(price)}</div>
                  <div class="meta">Marketplace: eBay</div>
                  <a href="${escapeHtml(affiliateLink)}" target="_blank" rel="noopener noreferrer">View on eBay</a>
                  <br><br>
                  <button onclick="saveListing(
                    '${escapeJs(title)}',
                    '${escapeJs(affiliateLink)}',
                    '${escapeJs(image)}',
                    '${escapeJs(price)}',
                    'eBay'
                  )">Save Listing</button>
                </div>
              </div>
            `;
          });
        } else {
          ebayHtml += `
            <div class="card">
              <div class="content">
                <div class="title">No eBay results found</div>
                <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">
                  Search directly on eBay
                </a>
              </div>
            </div>
          `;
        }

        sections.push(ebayHtml);
      } catch (error) {
        sections.push(`
          <div class="section-title">eBay Results</div>
          <div class="card">
            <div class="content">
              <div class="title">Could not load eBay results</div>
            </div>
          </div>
        `);
      }

      // Up Garage
      sections.push(buildUpGarageSection(query, encodedQuery));

      // Other sources
      sections.push(`
        <div class="section-title">Other Sources</div>

        <div class="source-grid">
          <div class="source-card">
            <h3>Facebook Marketplace</h3>
            <p class="muted">Search Marketplace for <strong>${escapeHtml(query)}</strong></p>
            <a href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Facebook Marketplace
            </a>
          </div>

          <div class="source-card">
            <h3>Yahoo Auctions Japan</h3>
            <p class="muted">Search Yahoo Auctions Japan for <strong>${escapeHtml(query)}</strong></p>
            <a href="https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Yahoo Auctions Japan
            </a>
          </div>

          <div class="source-card">
            <h3>Forums & Web Listings</h3>
            <p class="muted">Search forums and listings related to <strong>${escapeHtml(query)}</strong></p>
            <a href="https://www.google.com/search?q=${encodedQuery}+car+parts" target="_blank" rel="noopener noreferrer">
              Search forums & listings
            </a>
          </div>
        </div>
      `);

      results.innerHTML = sections.join("");
    }

    function buildUpGarageSection(query, encodedQuery) {
      if (currentPlan !== "builder" && currentPlan !== "collector") {
        return `
          <div class="section-title">Up Garage</div>
          <div class="card">
            <div class="content">
              <div class="title">Up Garage is available on paid plans</div>
              <div class="meta">Upgrade for access to premium JDM sources and notified searches.</div>
              <a href="/pricing.html">View Pricing</a>
            </div>
          </div>
        `;
      }

      if (!upgarageAcknowledged) {
        return `
          <div class="section-title">Up Garage</div>
          <div class="card">
            <div class="content">
              <div class="title">Unlock Up Garage</div>
              <div class="meta">
                Up Garage is intended for enthusiasts sourcing parts for personal vehicle use, not resale. By viewing Up Garage results in Stray Parts, you agree to use this source in that spirit.
              </div>
              <label class="checkbox-row">
                <input type="checkbox" id="upgarage-agree-checkbox">
                <span>
                 I understand and agree.
                </span>
              </label>
              <div class="inline-actions">
                <button onclick="acknowledgeUpGarage()">Continue to Up Garage access</button>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="section-title">Up Garage</div>
        <div class="card">
          <div class="content">
            <div class="title">Search Up Garage</div>
            <div class="meta">
              Premium source for used JDM parts from Japan. Opens directly on Up Garage.
            </div>
            <a href="https://www.upgarage.com/en/ec/search/?search_word=${encodedQuery}" target="_blank" rel="noopener noreferrer">
              Search Up Garage for "${escapeHtml(query)}"
            </a>
          </div>
        </div>
      `;
    }

    async function acknowledgeUpGarage() {
      const checkbox = document.getElementById("upgarage-agree-checkbox");

      if (!checkbox || !checkbox.checked) {
        alert("Please tick the checkbox to continue.");
        return;
      }

      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      const { error } = await supabaseClient
        .from("profiles")
        .update({ upgarage_acknowledged: true })
        .eq("id", user.id);

      if (error) {
        alert("Could not save your acknowledgement.");
        return;
      }

      upgarageAcknowledged = true;
      searchParts();
    }

    async function saveListing(title, itemUrl, imageUrl, price, marketplace) {
      const { data: authData } = await supabaseClient.auth.getUser();
      const user = authData.user;

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      const { data: profile, error: profileError } = await supabaseClient
        .from("profiles")
        .select("plan")
        .eq("id", user.id)
        .single();

      if (profileError) {
        alert("Could not load your account plan.");
        return;
      }

      const { data: existingListings, error: countError } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", user.id);

      if (countError) {
        alert("Could not check saved listings.");
        return;
      }

      const isPaid = profile && profile.plan !== "free";

      if (!isPaid && existingListings.length >= 5) {
        const upgrade = confirm(
          "Free accounts can save up to 5 listings. Upgrade your plan for unlimited saved listings and notified searches. Go to pricing page now?"
        );

        if (upgrade) {
          window.location.href = "/pricing.html";
        }

        return;
      }

      const { data: duplicate, error: duplicateError } = await supabaseClient
        .from("saved_listings")
        .select("id")
        .eq("user_id", user.id)
        .eq("item_url", itemUrl)
        .maybeSingle();

      if (duplicateError) {
        alert("Could not check for duplicate listing.");
        return;
      }

      if (duplicate) {
        alert("You already saved this listing.");
        return;
      }

      const { error } = await supabaseClient
        .from("saved_listings")
        .insert([
          {
            user_id: user.id,
            title,
            item_url: itemUrl,
            image_url: imageUrl,
            price,
            marketplace
          }
        ]);

      if (error) {
        alert(error.message);
        return;
      }

      alert("Listing saved.");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(str) {
      return String(str || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, " ");
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    loadAccountBar().then(() => {
      if (q) {
        document.getElementById("query").value = q;
        searchParts();
      }
    });
  </script>
</body>
</html>
