<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #b0b0b0;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input {
      width: 320px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
    }

    button:hover {
      background: #e22f2f;
    }

    .results {
      margin-top: 40px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      margin: 16px 0;
      border-radius: 12px;
      text-align: left;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Stray Parts Search</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <div class="results" id="results"></div>

  <script>
    function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <h3>Enter a search term</h3>
            <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}`;
      const facebookUrl = `https://www.facebook.com/marketplace/search/?query=${encodedQuery}`;
      const yahooUrl = `https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}`;
      const googleUrl = `https://www.google.com/search?q=${encodedQuery}+car+parts`;

      results.innerHTML = `
        <div class="card">
          <h3>eBay</h3>
          <p>Search eBay for: <strong>${query}</strong></p>
          <a href="${ebayUrl}" target="_blank" rel="noopener noreferrer">View eBay listings</a>
        </div>

        <div class="card">
          <h3>Facebook Marketplace</h3>
          <p>Search Marketplace for: <strong>${query}</strong></p>
          <a href="${facebookUrl}" target="_blank" rel="noopener noreferrer">Search Facebook Marketplace</a>
        </div>

        <div class="card">
          <h3>Yahoo Auctions Japan</h3>
          <p>Search Yahoo Auctions Japan for: <strong>${query}</strong></p>
          <a href="${yahooUrl}" target="_blank" rel="noopener noreferrer">Search Yahoo Auctions Japan</a>
        </div>

        <div class="card">
          <h3>Forums & web listings</h3>
          <p>Search Google for forum posts and listings related to: <strong>${query}</strong></p>
          <a href="${googleUrl}" target="_blank" rel="noopener noreferrer">Search forums & listings</a>
        </div>
      `;
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    if (q) {
      document.getElementById("query").value = q;
      searchParts();
    }
  </script>
</body>
</html>
