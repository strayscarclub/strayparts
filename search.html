<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Parts - Stray Parts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ede8d0;
      color: #222;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .search-wrap {
      margin-top: 30px;
    }

    input {
      width: 360px;
      max-width: 80vw;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      background: #a42a0e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #c43c1d;
    }

    .results {
      margin-top: 40px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-title {
      text-align: left;
      font-size: 22px;
      margin: 30px 0 12px 0;
    }

    .card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      text-align: left;
    }

    .thumb {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      background: #2a2a2a;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 19px;
      font-weight: bold;
      margin: 0 0 10px 0;
      line-height: 1.4;
      color: white;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: white;
    }

    .meta {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      color: #c43c1d;
    }

    .source-card a {
      color: #a42a0e;
      text-decoration: none;
      font-weight: bold;
    }

    .source-card a:hover {
      color: #c43c1d;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .source-card {
      background: #1b1b1b;
      border-radius: 14px;
      padding: 18px;
      text-align: left;
      color: white;
    }

    .source-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .muted {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Stray Parts Search</h1>
  <p>Search multiple marketplaces for rare car parts</p>

  <div class="search-wrap">
    <input id="query" type="text" placeholder="Search car parts..." />
    <button onclick="searchParts()">Search</button>
  </div>

  <hr style="margin:40px auto;width:60%;border:0;border-top:1px solid #d6d1b9;">

  <div class="results" id="results"></div>

  <script>
    async function searchParts() {
      const input = document.getElementById("query");
      const results = document.getElementById("results");
      const query = input.value.trim();

      if (!query) {
        results.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Enter a search term</div>
              <p>Try something like: GC8 seats, WRX turbo, BBS wheels 5x100</p>
            </div>
          </div>
        `;
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      results.innerHTML = `
        <div class="card">
          <div class="content">
            <div class="title">Searching eBay...</div>
            <p class="muted">Looking for <strong>${query}</strong></p>
          </div>
        </div>
      `;

      try {
        const res = await fetch("/api/ebay?q=" + encodedQuery);
        const data = await res.json();

        let html = `<div class="section-title">eBay Results</div>`;

        if (data.itemSummaries && data.itemSummaries.length > 0) {
          data.itemSummaries.forEach((item) => {
            const title = item.title || "Untitled listing";
            const link = item.itemWebUrl || "#";
            const affiliateLink =
  "https://rover.ebay.com/rover/1/711-53200-19255-0/1?campid=5339144348&toolid=10001&mpre=" +
  encodeURIComponent(link);
            const price = item.price
              ? `${item.price.value} ${item.price.currency}`
              : "Price not available";
            const image = item.image && item.image.imageUrl
              ? item.image.imageUrl
              : "";

            html += `
              <div class="card">
                ${
                  image
                    ? `<img class="thumb" src="${image}" alt="${title}">`
                    : `<div class="thumb"></div>`
                }
                <div class="content">
                  <div class="title">${title}</div>
                  <div class="price">${price}</div>
                  <div class="meta">Marketplace: eBay</div>
                  <a href="${affiliateLink}" target="_blank" rel="noopener noreferrer">
View on eBay
</a>
                </div>
              </div>
            `;
          });
        } else {
          html += `
            <div class="card">
              <div class="content">
                <div class="title">No eBay results found</div>
                <a href="https://www.ebay.com/sch/i.html?_nkw=${encodedQuery}" target="_blank" rel="noopener noreferrer">
                  Search directly on eBay
                </a>
              </div>
            </div>
          `;
        }

        html += `
          <div class="section-title">Other Sources</div>

          <div class="source-grid">
            <div class="source-card">
              <h3>Facebook Marketplace</h3>
              <p class="muted">Search Marketplace for <strong>${query}</strong></p>
              <a href="https://www.facebook.com/marketplace/search/?query=${encodedQuery}" target="_blank" rel="noopener noreferrer">
                Search Facebook Marketplace
              </a>
            </div>

            <div class="source-card">
              <h3>Yahoo Auctions Japan</h3>
              <p class="muted">Search Yahoo Auctions Japan for <strong>${query}</strong></p>
              <a href="https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}" target="_blank" rel="noopener noreferrer">
                Search Yahoo Auctions Japan
              </a>
            </div>

            <div class="source-card">
              <h3>Forums & Web Listings</h3>
              <p class="muted">Search forums and listings related to <strong>${query}</strong></p>
              <a href="https://www.google.com/search?q=${encodedQuery}+car+parts" target="_blank" rel="noopener noreferrer">
                Search forums & listings
              </a>
            </div>
          </div>
        `;

        results.innerHTML = html;
      } catch (error) {
        results.innerHTML = `
          <div class="card">
            <div class="content">
              <div class="title">Could not load results</div>
              <p class="muted">Please try again.</p>
            </div>
          </div>
        `;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    if (q) {
      document.getElementById("query").value = q;
      searchParts();
    }
  </script>

  <footer style="margin-top:80px;padding:30px 20px;border-top:1px solid #d6d1b9;text-align:center;">
    <p style="color:#666;font-size:14px;margin-bottom:14px;">
      Stray Parts searches marketplaces like eBay, Facebook Marketplace and Yahoo Auctions to help enthusiasts find rare car parts faster.
    </p>

    <div style="margin-bottom:12px;">
      <a href="/" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Home</a>
      <a href="/about.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">About</a>
      <a href="/contact.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Contact</a>
      <a href="/privacy.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Privacy</a>
      <a href="/pricing.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Pricing</a>
    </div>

    <p style="color:#888;font-size:13px;margin:0;">
      © Stray Parts
    </p>
  </footer>
</body>
</html>
