<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stray Parts</title>
  <link rel="stylesheet" href="/site.css" />
  <style>
    .home-page {
      text-align: center;
      padding-top: 50px;
    }

    .home-account-wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 20px 0;
      display: flex;
      justify-content: flex-end;
    }

    .home-hero {
      padding: 10px 20px 0;
    }

    .home-tagline {
      color: #555;
      margin-top: 10px;
      font-size: 16px;
    }

    .home-search {
      margin-top: 24px;
    }

    .home-search input {
      width: 320px;
      max-width: 100%;
    }
  </style>
</head>
<body class="home-page">
  <div class="home-account-wrap">
    <div class="account-bar" id="account-bar"></div>
  </div>

  <main class="home-hero">
    <div class="hero-logo">
      <img src="/strayparts-logo.png" alt="Stray Parts logo">
    </div>

    <p class="home-tagline">Find rare car parts across the internet</p>

    <div class="search-wrap home-search">
      <input id="search" class="search-input" placeholder="Search parts...">
      <button class="search-btn" onclick="goSearch()">Search</button>
    </div>
  </main>

  <hr class="divider">

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/site.js"></script>
  <script>
    function goSearch() {
      const query = document.getElementById("search").value.trim();
      if (!query) return;
      window.location.href = "/search.html?q=" + encodeURIComponent(query);
    }

    loadAccountBar();
    mountSiteFooter();

    document.getElementById("search").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        goSearch();
      }
    });
  </script>
</body>
</html>
