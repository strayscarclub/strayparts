<!DOCTYPE html>
<html>
<head>
 
<title>Stray Parts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: #ede8d0;
color: #222;
padding-top:120px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
color:#555;
}

input{
width:320px;
padding:14px;
font-size:18px;
border-radius:6px;
border:none;
margin-top:20px;
}

button{
padding:14px 22px;
font-size:18px;
border:none;
border-radius:6px;
background: #a42a0e;
color:white;
cursor:pointer;
margin-left:8px;
}

button:hover{
background: #c43c1d;
}

.links{
margin-top:40px;
}

a{
color:#a42a0e;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Stray Parts</h1>

<p>Find rare car parts across the internet</p>

<input id="search" placeholder="Search parts...">
<button onclick="goSearch()">Search</button>

<hr style="margin:40px auto;width:60%;border:0;border-top:1px solid #d6d1b9;">

<script>
  function goSearch() {
    const query = document.getElementById("search").value.trim();
    if (!query) return;
    window.location.href = "/search.html?q=" + encodeURIComponent(query);
  }
</script>

<footer style="margin-top:80px;padding:30px 20px;border-top:1px solid #d6d1b9;text-align:center;">
  <p style="color:#666;font-size:14px;margin-bottom:14px;">
    Stray Parts searches marketplaces like eBay, Facebook Marketplace and Yahoo Auctions to help enthusiasts find rare car parts faster.
  </p>

  <div style="margin-bottom:12px;">
    <a href="/" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Home</a>
    <a href="/about.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">About</a>

    <a href="/pricing.html" style="color:#a42a0e;text-decoration:none;margin:0 10px;">Pricing</a>
  </div>

  <p style="color:#888;font-size:13px;margin:0;">
    © Stray Parts
  </p>
</footer>
